repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: conda run -n merxen mypy src/
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: conda run -n merxen pytest -m "not slow"
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
